<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartDorm | Secure Elite Gate</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
    :root { 
      --gold: #C5A059; --bg: #050505; --panel: #0A0A0A; --text: #EAEAEA; --text-dim: #444;
      --success: #00FFBB; --danger: #FF3366;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    .header { height: 75px; padding: 0 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .logo { font-weight: 900; font-size: 20px; } .logo span { color: var(--gold); }
    #clock { font-size: 16px; font-weight: 700; color: var(--gold); font-family: monospace; letter-spacing: 2px; }

    .main { flex: 1; display: grid; grid-template-columns: 1fr 480px; }
    
    .scanner-side { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; border-right: 1px solid rgba(255,255,255,0.03); }
    .video-shell { 
      position: relative; 
      width: 90%; 
      max-width: 950px; 
      aspect-ratio: 16/9; 
      background: #080808;
      border-radius: 40px; 
      overflow: hidden; 
      border: 2px solid rgba(255,255,255,0.08); 
      box-shadow: 0 50px 120px rgba(0,0,0,1); 
    }
    #video { width:100%; height:100%; object-fit: cover; transform: scaleX(-1); }
    #canvas { position: absolute; inset:0; transform: scaleX(-1); z-index: 5; }

    /* FACE GUIDE OVERLAY */
    .face-guide {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 280px; height: 380px;
      border: 2px dashed rgba(197, 160, 89, 0.2);
      border-radius: 150px;
      z-index: 10; pointer-events: none;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .face-guide::before, .face-guide::after {
      content: ''; position: absolute; inset: -20px;
      border: 2px solid transparent; border-radius: 40px;
    }
    .face-guide.active { border-color: var(--success); border-style: solid; box-shadow: 0 0 50px rgba(0, 255, 187, 0.15); width: 300px; height: 400px; }

    .guide-corners {
      position: absolute; inset: 40px; border: 1px solid rgba(255,255,255,0.03);
      pointer-events: none; z-index: 9;
    }
    .corner { position: absolute; width: 30px; height: 30px; border: 2px solid var(--gold); opacity: 0.3; }
    .top-l { top: 0; left: 0; border-right: 0; border-bottom: 0; border-radius: 15px 0 0 0; }
    .top-r { top: 0; right: 0; border-left: 0; border-bottom: 0; border-radius: 0 15px 0 0; }
    .bot-l { bottom: 0; left: 0; border-right: 0; border-top: 0; border-radius: 0 0 0 15px; }
    .bot-r { bottom: 0; right: 0; border-left: 0; border-top: 0; border-radius: 0 0 15px 0; }

    .hud-banner {
      position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
      padding: 14px 40px; border-radius: 100px;
      font-size: 11px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1); z-index: 10;
      transition: all 0.4s; color: var(--gold);
    }
    .hud-banner.active { color: var(--success); border-color: var(--success); box-shadow: 0 0 30px rgba(0, 255, 187, 0.2); }
    .hud-banner.denied { color: var(--danger); border-color: var(--danger); }

    .panel-side { background: var(--panel); padding: 40px; display: flex; flex-direction: column; gap: 20px; }
    .profile-card { background: rgba(255,255,255,0.01); border: 1.5px solid rgba(255,255,255,0.03); border-radius: 40px; padding: 35px 25px; text-align: center; transition: 0.5s; }
    .profile-card.granted { border-color: var(--success); }
    .profile-card.denied { border-color: var(--danger); }
    
    .user-name { font-size: 32px; font-weight: 900; margin-bottom: 25px; letter-spacing: -1.5px; }
    .info-list { display: grid; grid-template-columns: 1fr; gap: 8px; text-align: left; }
    .info-item { background: rgba(255,255,255,0.02); padding: 14px 22px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; }
    .info-item span:first-child { color: var(--text-dim); text-transform: uppercase; font-weight: 900; font-size: 9px; }
    .info-item span:last-child { font-size: 13px; font-weight: 600; color: #fff; }

    .log-stack { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
    .log-row { background: rgba(255,255,255,0.02); padding: 15px 24px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; border-left: 4px solid var(--gold); }
  </style>
</head>
<body onload="boot()">
  <div class="header">
    <div class="logo">SMART<span>DORM</span> • ELITE LOCK</div>
    <div id="clock">00:00:00</div>
  </div>

  <div class="main">
    <div class="scanner-side">
      <div id="booting" style="position:absolute; inset:0; background:#000; z-index:100; display:flex; align-items:center; justify-content:center;">
        <p style="color:var(--gold); font-size:12px; font-weight:900; letter-spacing:10px;">SECURE BOOTING...</p>
      </div>
      <div class="hud-banner" id="hud">HÃY CHỚP MẮT ĐỂ MỞ CỬA</div>
      <div class="video-shell" id="vShell" style="display:none;">
        <div class="face-guide" id="fGuide"></div>
        <div class="guide-corners">
          <div class="corner top-l"></div><div class="corner top-r"></div>
          <div class="corner bot-l"></div><div class="corner bot-r"></div>
        </div>
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
      </div>
    </div>

    <div class="panel-side">
      <div class="profile-card" id="pCard">
        <h2 class="user-name" id="userName">--- ---</h2>
        <div class="info-list">
          <div class="info-item"><span>Mã số</span><span id="resID">--</span></div>
          <div class="info-item"><span>Vị trí</span><span id="resLoc">--</span></div>
          <div class="info-item"><span>Email</span><span id="resEmail">--</span></div>
          <div class="info-item"><span>SĐT</span><span id="resSdt">--</span></div>
          <div class="info-item"><span>Vai trò</span><span id="resRole">--</span></div>
        </div>
      </div>
      <div class="log-stack" id="logs"><p style="font-size:9px; font-weight:900; color:#444; letter-spacing:2px; margin-bottom:5px;">LỊCH SỬ TRUY CẬP</p></div>
    </div>
  </div>

  <script>
    let currentID = null, gone = 0, busy = false;
    let eyesClosed = false, blinkDetected = false;

    async function boot() {
      try {
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri('./models_v2'),
          faceapi.nets.faceLandmark68Net.loadFromUri('./models_v2'),
          faceapi.nets.faceRecognitionNet.loadFromUri('./models_v2')
        ]);
        const s = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
        document.getElementById('video').srcObject = s;
        document.getElementById('booting').style.display = 'none';
        document.getElementById('vShell').style.display = 'block';
        loop();
      } catch (err) { console.error(err); }
    }

    let lastLandmarks = null, motionBuffer = [], faceStableCounter = { current: 0 };

    async function loop() {
      const v = document.getElementById('video');
      const step = async () => {
        if (v.paused || v.ended) return requestAnimationFrame(step);
        const d = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions({ inputSize: 512, scoreThreshold: 0.5 }))
                                .withFaceLandmarks().withFaceDescriptor();
        if (d) {
          gone = 0;
          document.getElementById('fGuide').classList.add('active');
          
          // PHÂN TÍCH VI CHUYỂN ĐỘNG (Liveness ngầm)
          if (lastLandmarks) {
            const current = d.landmarks.positions;
            const diff = current.reduce((acc, p, i) => acc + Math.abs(p.x - lastLandmarks[i].x) + Math.abs(p.y - lastLandmarks[i].y), 0);
            motionBuffer.push(diff);
            if (motionBuffer.length > 25) motionBuffer.shift(); // Lưu ~1 giây dữ liệu
          }
          lastLandmarks = d.landmarks.positions;

          // SIÊU NHẠY: Chỉ cần 3 khung hình liên tiếp là gọi xác thực ngay
          faceStableCounter.current++;
          if (faceStableCounter.current >= 3) {
             updateStatus("ĐANG XÁC THỰC...", "active");
             await verify(d.descriptor);
             faceStableCounter.current = 0;
          }
        } else {
          gone++; faceStableCounter.current = 0;
          document.getElementById('fGuide').classList.remove('active');
          if (gone > 30) { 
            currentID = null; 
            document.getElementById('pCard').className = "profile-card"; 
            updateStatus("CHỜ NHẬN DIỆN", ""); 
          }
        }
        requestAnimationFrame(step);
      }; 
      step();
    }

    function getEAR(lm) {
      const l = lm.getLeftEye(), r = lm.getRightEye();
      const dist = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
      return ((dist(l[1], l[5]) + dist(l[2], l[4])) / (2 * dist(l[0], l[3])) + (dist(r[1], r[5]) + dist(r[2], r[4])) / (2 * dist(r[0], r[3]))) / 2;
    }

    async function verify(desc) {
      if (busy) return; busy = true;
      try {
        const res = await fetch('http://localhost:5000/face/recognize', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ faceDescriptor: Array.from(desc) })
        });
        const data = await res.json();
        const dist = data.distance ? ` (D: ${data.distance.toFixed(3)})` : "";

        if (data.success) {
          if (data.user.studentId !== currentID) {
            currentID = data.user.studentId;
            updateStatus("THÀNH CÔNG" + dist, "active");
            updateUI(data.user);
            setTimeout(() => { if (currentID) updateStatus("ĐANG TRỰC CHIẾN", ""); }, 4000);
          }
        } else {
          updateStatus("TỪ CHỐI" + dist, "denied");
          showFail();
          setTimeout(() => { if (!currentID) updateStatus("HÃY CHỚP MẮT TỰ NHIÊN", ""); }, 3000);
        }
      } catch (err) { updateStatus("LỖI KẾT NỐI", "denied"); } finally { busy = false; }
    }

    function updateStatus(t, c) { const h = document.getElementById('hud'); h.textContent = t; h.className = "hud-banner " + (c || ""); }

    function updateUI(u) {
      document.getElementById('userName').textContent = u.name;
      document.getElementById('resID').textContent = u.studentId;
      document.getElementById('resLoc').textContent = (u.room || "P.") + " • " + (u.block || "Tòa");
      document.getElementById('resEmail').textContent = u.email || "N/A";
      document.getElementById('resSdt').textContent = u.phoneNumber || "N/A";
      document.getElementById('resRole').textContent = u.role || "Cư dân";
      document.getElementById('pCard').className = "profile-card granted";
      
      const time = new Date().getHours().toString().padStart(2, '0') + ":" + new Date().getMinutes().toString().padStart(2, '0') + ":" + new Date().getSeconds().toString().padStart(2, '0');
      const item = document.createElement('div');
      item.className = 'log-row';
      item.innerHTML = `<span>${time}</span><b>${u.name}</b><span style="color:var(--success); font-weight:900;">OK</span>`;
      const list = document.getElementById('logs');
      list.insertBefore(item, list.firstChild.nextSibling); 
    }

    function showFail() {
      document.getElementById('pCard').className = "profile-card denied";
      document.getElementById('userName').textContent = "BỊ TỪ CHỐI";
      const time = new Date().getHours().toString().padStart(2, '0') + ":" + new Date().getMinutes().toString().padStart(2, '0') + ":" + new Date().getSeconds().toString().padStart(2, '0');
      const item = document.createElement('div');
      item.className = 'log-row';
      item.style.borderLeftColor = 'var(--danger)';
      item.innerHTML = `<span>${time}</span><b>Người lạ</b><span style="color:var(--danger); font-weight:900;">FAIL</span>`;
      const list = document.getElementById('logs');
      list.insertBefore(item, list.firstChild.nextSibling);
      setTimeout(() => { if (!currentID) document.getElementById('pCard').className = "profile-card"; }, 4000);
    }

    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('vi-VN'); }, 1000);
  </script>
</body>
</html>
