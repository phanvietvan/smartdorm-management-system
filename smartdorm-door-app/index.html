<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartDorm Door Access</title>
  <script src="face-api.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #070714;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== TOP HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.05em;
    }
    .logo span { color: #6366f1; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .clock {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.05em;
    }

    .status-badge {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      padding: 5px 14px;
      border-radius: 100px;
    }
    .status-badge.loading { background: rgba(234,179,8,0.15); color: #fde68a; border: 1px solid rgba(234,179,8,0.3); }
    .status-badge.ready   { background: rgba(34,197,94,0.12); color: #86efac; border: 1px solid rgba(34,197,94,0.25); }
    .status-badge.error   { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }

    /* ===== MAIN CONTENT ===== */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 0;
      overflow: hidden;
    }

    /* ===== LEFT: CAMERA PANEL ===== */
    .camera-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
      border-right: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.01);
    }

    .camera-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.3);
    }

    /* Camera box với tỉ lệ 4:3 cố định */
    .camera-box {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 16px;
      overflow: hidden;
      background: #0d0d20;
      border: 1px solid rgba(255,255,255,0.07);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    /* Khung quét tròn ở giữa camera */
    .scan-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12);
      pointer-events: none;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    .scan-ring.scanning {
      border-color: rgba(99,102,241,0.7);
      box-shadow: 0 0 30px rgba(99,102,241,0.2), inset 0 0 30px rgba(99,102,241,0.05);
      animation: ring-pulse 2s ease-in-out infinite;
    }

    .scan-ring.granted {
      border-color: rgba(34,197,94,0.9);
      box-shadow: 0 0 40px rgba(34,197,94,0.3);
    }

    .scan-ring.denied {
      border-color: rgba(239,68,68,0.9);
      box-shadow: 0 0 40px rgba(239,68,68,0.3);
    }

    @keyframes ring-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.15); }
      50% { box-shadow: 0 0 40px rgba(99,102,241,0.3); }
    }

    /* Corner brackets - effect bảng điều khiển */
    .camera-box::before,
    .camera-box::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: rgba(99,102,241,0.4);
      border-style: solid;
      pointer-events: none;
      z-index: 10;
      transition: border-color 0.4s;
    }
    .camera-box::before {
      top: 10px; left: 10px;
      border-width: 2px 0 0 2px;
      border-radius: 2px 0 0 0;
    }
    .camera-box::after {
      bottom: 10px; right: 10px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 2px 0;
    }

    /* Scan line animation */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,0.6), transparent);
      animation: scan-move 3s linear infinite;
      pointer-events: none;
    }

    @keyframes scan-move {
      0%   { top: 0%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* Scan indicator */
    .scan-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.35);
    }

    .scan-indicator .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #6366f1;
      flex-shrink: 0;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ===== RIGHT: INFO PANEL ===== */
    .info-panel {
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 20px;
      overflow: hidden;
    }

    /* Result Card - hiện kết quả nhận diện */
    .result-card {
      padding: 24px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      transition: all 0.5s ease;
      min-height: 120px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .result-card.granted {
      background: rgba(34,197,94,0.07);
      border-color: rgba(34,197,94,0.2);
    }

    .result-card.denied {
      background: rgba(239,68,68,0.07);
      border-color: rgba(239,68,68,0.2);
    }

    .result-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.5s;
    }

    .result-card.granted .result-icon { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.2); }
    .result-card.denied  .result-icon { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); }

    .result-info .result-name {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: rgba(255,255,255,0.9);
      margin-bottom: 4px;
    }

    .result-info .result-sub {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .result-card.granted .result-name { color: #86efac; }
    .result-card.denied  .result-name { color: #fca5a5; }

    /* Divider */
    .divider {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.05);
    }

    /* Log list */
    .log-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .log-list::-webkit-scrollbar { width: 3px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .log-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      animation: slideUp 0.3s ease;
      border: 1px solid transparent;
    }

    .log-item.granted-log {
      background: rgba(34,197,94,0.06);
      border-color: rgba(34,197,94,0.12);
      color: #86efac;
    }
    .log-item.denied-log {
      background: rgba(239,68,68,0.06);
      border-color: rgba(239,68,68,0.12);
      color: #fca5a5;
    }

    .log-item .log-time {
      color: rgba(255,255,255,0.25);
      font-size: 10px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .empty-log {
      text-align: center;
      padding: 32px;
      color: rgba(255,255,255,0.15);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">SmartDorm<span>.</span></div>
    <div class="header-right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="status-badge loading" id="statusBadge">Loading AI...</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: CAMERA -->
    <div class="camera-panel">
      <div class="camera-label">📷 Live Camera Feed</div>

      <div class="camera-box">
        <video id="video" autoplay muted playsinline></video>
        <div class="scan-ring" id="scanRing"></div>
        <div class="scan-line"></div>
      </div>

      <div class="scan-indicator">
        <span class="dot"></span>
        <span id="scanIndicator">Đang khởi tạo AI...</span>
      </div>
    </div>

    <!-- RIGHT: INFO -->
    <div class="info-panel">

      <!-- Kết quả nhận diện -->
      <div class="result-card" id="resultCard">
        <div class="result-icon" id="resultIcon">🔍</div>
        <div class="result-info">
          <div class="result-name" id="resultName">Đang chờ nhận diện</div>
          <div class="result-sub" id="resultSub">Hãy nhìn thẳng vào camera</div>
        </div>
      </div>

      <div class="divider">Lịch sử hôm nay</div>

      <!-- Log list -->
      <div class="log-list" id="logList">
        <div class="empty-log">Chưa có lượt ra vào nào</div>
      </div>

    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000';
    const SCAN_INTERVAL = 2000;
    const DEBOUNCE_MS = 4000;

    let isScanning = false;
    let lastMatchTime = 0;
    let hasLogs = false;

    const video       = document.getElementById('video');
    const scanRing    = document.getElementById('scanRing');
    const statusBadge = document.getElementById('statusBadge');
    const scanIndicator = document.getElementById('scanIndicator');
    const resultCard  = document.getElementById('resultCard');
    const resultIcon  = document.getElementById('resultIcon');
    const resultName  = document.getElementById('resultName');
    const resultSub   = document.getElementById('resultSub');
    const logList     = document.getElementById('logList');
    const clock       = document.getElementById('clock');

    // Đồng hồ realtime
    setInterval(() => {
      clock.textContent = new Date().toLocaleTimeString('vi-VN');
    }, 1000);

    // --- 1. Camera ---
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
        });
        video.srcObject = stream;
      } catch (err) {
        showResult('denied', '❌', 'Camera không khả dụng', 'Kiểm tra kết nối camera');
      }
    }

    // --- 2. Load AI models ---
    async function loadModels() {
      try {
        // Tải AI Models từ thư mục /models_v2
        await faceapi.nets.tinyFaceDetector.loadFromUri('./models_v2');
        await faceapi.nets.faceLandmark68Net.loadFromUri('./models_v2');
        await faceapi.nets.faceRecognitionNet.loadFromUri('./models_v2');

        statusBadge.textContent = 'READY';
        statusBadge.className = 'status-badge ready';
        scanIndicator.textContent = 'Đang quét khuôn mặt...';
        scanRing.className = 'scan-ring scanning';
        return true;
      } catch (err) {
        statusBadge.textContent = 'ERROR';
        statusBadge.className = 'status-badge error';
        scanIndicator.textContent = 'Lỗi tải AI models';
        console.error('Model error:', err);
        return false;
      }
    }

    // --- 3. Quét face ---
    async function scanFace() {
      if (isScanning) return;
      if (Date.now() - lastMatchTime < DEBOUNCE_MS) return;

      isScanning = true;

      try {
        const detection = await faceapi
          .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
          .withFaceLandmarks()
          .withFaceDescriptor();

        if (!detection) {
          // Reset về trạng thái chờ
          resetResult();
          isScanning = false;
          return;
        }

        const faceDescriptor = Array.from(detection.descriptor);

        const res = await fetch(`${API_URL}/face/recognize`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ faceDescriptor, deviceId: 'door-main' }),
        });

        const data = await res.json();

        if (data.success) {
          showResult('granted', '✅', `Xin chào, ${data.student.name}!`, `Mã: ${data.student.studentId}`);
          addLog(`${data.student.name} (${data.student.studentId})`, 'granted');
          scanRing.className = 'scan-ring granted';
          lastMatchTime = Date.now();
          console.log('🚪 DOOR OPENED for:', data.student.name);

          setTimeout(() => {
            resetResult();
            scanRing.className = 'scan-ring scanning';
          }, 4000);
        } else {
          showResult('denied', '🚫', 'Không nhận diện được', 'Truy cập bị từ chối');
          addLog('Không xác định danh tính', 'denied');
          scanRing.className = 'scan-ring denied';

          setTimeout(() => {
            resetResult();
            scanRing.className = 'scan-ring scanning';
          }, 3000);
        }
      } catch (err) {
        console.error('Scan error:', err);
      }

      isScanning = false;
    }

    function showResult(type, icon, name, sub) {
      resultCard.className = `result-card ${type}`;
      resultIcon.textContent = icon;
      resultName.textContent = name;
      resultSub.textContent = sub;
    }

    function resetResult() {
      resultCard.className = 'result-card';
      resultIcon.textContent = '🔍';
      resultName.textContent = 'Đang chờ nhận diện';
      resultSub.textContent = 'Hãy nhìn thẳng vào camera';
    }

    function addLog(text, type) {
      if (!hasLogs) {
        logList.innerHTML = '';
        hasLogs = true;
      }
      const time = new Date().toLocaleTimeString('vi-VN');
      const item = document.createElement('div');
      item.className = `log-item ${type}-log`;
      item.innerHTML = `
        <span>${type === 'granted' ? '✅' : '❌'}</span>
        <span style="flex:1">${text}</span>
        <span class="log-time">${time}</span>
      `;
      logList.insertBefore(item, logList.firstChild);
      while (logList.children.length > 15) logList.removeChild(logList.lastChild);
    }

    async function init() {
      await startCamera();
      const ok = await loadModels();
      if (ok) setInterval(scanFace, SCAN_INTERVAL);
    }

    init();
  </script>
</body>
</html>
